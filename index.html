<style>
  :root {
    --color-background-primary: #ffffff;

    --color-text-success: #27500a;
    --color-text-info: #0c447c;
    --color-border-tertiary: rgba(0,0,0,0.15);

    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1c;
      --color-background-secondary: #262626;
      --color-background-tertiary: #2e2e2e;
      --color-background-danger: #3a1f1f;
      --color-background-warning: #3a2f12;
      --color-background-success: #1f2e14;
      --color-background-info: #15293a;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #b0b0b0;
      --color-text-tertiary: #808080;
      --color-text-danger: #f0a8a8;
      --color-text-warning: #f0cf8a;
      --color-text-success: #b3d98a;
      --color-text-info: #a8cdf0;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-border-secondary: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    margin: 0;
    padding: 24px 16px 60px;
  }
  .page { max-width: 700px; margin: 0 auto; }
  input, select, textarea, button { font-family: var(--font-sans); }
  input[type=text], input[type=date], select, textarea {

  input[type=text]:focus, input[type=date]:focus, select:focus, textarea:focus {

    box-shadow: 0 0 0 2px var(--color-text-info);
  }

  .mt-kpi { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .mt-kpi .lbl { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
  .mt-kpi .val { font-size: 22px; font-weight: 500; margin: 0; }
  .mt-pill { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 100px; font-weight: 500; white-space: nowrap; }
  .mt-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.9rem 1rem; margin-bottom: 10px; }
  .mt-btn { font-size: 12px; padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  .mt-btn:hover { background: var(--color-background-secondary); }
  .mt-tab { font-size: 13px; padding: 6px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
  .mt-tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .mt-select, .mt-input { font-size: 13px; }

</style>

<div class="page" id="app-root"></div>
<script>
  window.storage = (function(){
    const PREFIX = "med_tracker_";
    function read(k){ const raw = localStorage.getItem(PREFIX+k); if(raw===null) return undefined; return raw; }
    return {
      get: async (key, shared) => {
        const k = (shared?"shared:":"priv:")+key;
        const v = read(k);
        if (v === undefined) throw new Error("not found");
        return { key, value: v, shared: !!shared };
      },
      set: async (key, value, shared) => {
        const k = (shared?"shared:":"priv:")+key;
        localStorage.setItem(PREFIX+k, value);
        return { key, value, shared: !!shared };
      },
      delete: async (key, shared) => {
        const k = (shared?"shared:":"priv:")+key;
        localStorage.removeItem(PREFIX+k);
        return { key, deleted: true, shared: !!shared };
      },
      list: async (prefix, shared) => {
        const p = PREFIX + (shared?"shared:":"priv:") + (prefix||"");
        const keys = [];
        for (let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith(p)) keys.push(k.slice(PREFIX.length)); }
        return { keys, prefix, shared: !!shared };
      }
    };
  })();
  window.sendPrompt = function(text){ alert("This button links back to a Claude conversation, which isn't available in the standalone version. Your message would have been:\n\n" + text); };
  window.openLink = function(url){ window.open(url, "_blank"); };
</script>

tamol in Box 2, different manufacturer. Reduces fever and mild-to-moderate pain.","category":"Pain/Fever","qty":"~6 tablets (partial strip)","expiry":"2027-07-01","action":"Keep","notes":"Same medicine as Galenika version (Box 2), different manufacturer — this one valid"},{"id":"b4-1","box":"Box 4: Printed pouch with horse rider/face design","name":"Panklav 2X","nameLocal":"Panklav 2X","ingredient":"Amoxicillin 875mg + Clavulanic acid 125mg","manufacturer":"Hemofarm","use":"Antibiotic — bacterial infections","about":"Same combination antibiotic as in Box 1 — amoxicillin plus clavulanic acid, used for a broad range of bacterial infections. This is a second, separate box.","category":"Antibiotic","qty":"1 box (14 tabs)","expiry":"2027-03-01","action":"Keep","notes":"2nd box — combined w/ Box 1's (exp. 09/2027)"},{"id":"b4-2","box":"Box 4: Printed pouch with horse rider/face design","name":"Definol Forte","nameLocal":"Definol Forte","ingredient":"Pseudoephedrine 60mg + Ibuprofen 400mg","manufacturer":"Galenika","use":"Cold/flu relief — decongestant + pain/anti-inflammatory","about":"A two-in-one cold/flu remedy: pseudoephedrine shrinks swollen nasal blood vessels to relieve congestion, while ibuprofen reduces the pain, fever, and body aches that come with a cold or flu.","category":"Cold/Decongestant","qty":"1 box","expiry":"2025-10-01","action":"Needs Refill","notes":""},{"id":"b4-3","box":"Box 4: Printed pouch with horse rider/face design","name":"Strong Nature Aktivni Ugalj","nameLocal":"Aktivni ugalj Strong Nature","ingredient":"Activated charcoal","manufacturer":"Strong Nature","use":"Digestive supplement — gut/stomach health","about":"Same activated charcoal product as the one in Box 3 — same brand, same batch. Adsorbs gas/irritants in the gut for bloating relief.","category":"GI/Digestive","qty":"1 box (10 caps)","expiry":"2028-12-01","action":"Keep","notes":"2nd box, same batch as Box 3's — combined total 2 boxes (20 caps)"},{"id":"b4-4","box":"Box 4: Printed p   const STORAGE_KEY = "med-inventory-v1";
  let state = { items: null, activeBox: "all", search: "", statusFilter: "all", actionFilter: "all" };

  function daysUntil(expiry, today) {
    if (!expiry) return null;
    const exp = new Date(expiry + "T00:00:00");
    const t = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    return Math.round((exp - t) / 86400000);
  }
  function expiryStatus(expiry, today) {
    if (!expiry) return "valid";
    const d = daysUntil(expiry, today);
    if (d < 0) return "expired";
    if (d <= 60) return "soon";
    return "valid";
  }
  function actionBucket(action) {
    if (!action) return "other";
    const a = action.toLowerCase();
    if (a.includes("no refill")) return "keep-no-refill";
    if (a === "needs refill") return "needs-refill";
    if (a === "refill soon") return "refill-soon";
    if (a === "keep") return "keep";
    if (a === "discard") return "discard";
    return "other";
  }
  function needsAction(item) {
    const b = actionBucket(item.action);
    return b === "needs-refill" || b === "refill-soon";
  }
  function fmtDate(expiry) {
    if (!expiry) return "No date on file";
    const d = new Date(expiry + "T00:00:00");
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short" });
  }
  function statusPill(status) {
    const map = {
      expired: ["Expired", "var(--color-background-danger)", "var(--color-text-danger)"],
      soon: ["Expiring soon", "var(--color-background-warning)", "var(--color-text-warning)"],
      valid: ["Valid", "var(--color-background-success)", "var(--color-text-success)"]
    };
    const [label, bg, fg] = map[status];
    return `<span class="mt-pill" style="background:${bg}; color:${fg};">${label}</span>`;
  }
  function actionPill(action) {
    const b = actionBucket(action);
    const map = {
      "keep": ["Keep", "var(--color-background-success)", "var(--color-text-success)"],
      "needs-refill": ["Needs refill", "var(--color-background-danger)", "var(--color-text-danger)"],
      "refill-soon": ["Refill soon", "var(--color-background-warning)", "var(--color-text-warning)"],
      "keep-no-refill": ["Keep, no refill", "var(--color-background-tertiary)", "var(--color-text-secondary)"],
      "discard": ["Discard", "var(--color-background-tertiary)", "var(--color-text-secondary)"],
      "other": [action || "-", "var(--color-background-tertiary)", "var(--color-text-secondary)"]
    };
    const [label, bg, fg] = map[b];
    return `<span class="mt-pill" style="background:${bg}; color:${fg};">${label}</span>`;
  }

  async function loadState() {
    try {
      const result = await window.storage.get(STORAGE_KEY, false);
      if (result && result.value) {
        state.items = JSON.parse(result.value);
        return;
      }
    } catch (e) {}
    state.items = JSON.parse(JSON.stringify(SEED_DATA));
  }
  async function saveState() {
    const el = document.getElementById("mt-savestate");
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(state.items), false);
      if (el) { el.textContent = "Saved locally"; el.style.color = ""; }
    } catch (e) {
      if (el) { el.textContent = "Save failed - changes may not persist"; el.style.color = "var(--color-text-danger)"; }
    }
  }

  function getBoxes() {
    const boxes = [...new Set(state.items.map(i => i.box))];
    return boxes;
  }

  function renderTabs() {
    const boxes = getBoxes();
    const wrap = document.getElementById("mt-box-tabs");
    const allBtn = `<button class="mt-tab ${state.activeBox==='all'?'active':''}" data-box="all">All boxes</button>`;
    const boxBtns = boxes.map(b => {
      const shortName = b.includes(":") ? b.split(":")[1].trim() : b;
      return `<button class="mt-tab ${state.activeBox===b?'active':''}" data-box="${encodeURIComponent(b)}">${shortName}</button>`;
    }).join("");
    wrap.innerHTML = allBtn + boxBtns;
    wrap.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.activeBox = btn.dataset.box === "all" ? "all" : decodeURIComponent(btn.dataset.box);
        render();
      });
    });
  }

  function filteredItems(today) {
    return state.items.filter(item => {
      if (state.activeBox !== "all" && item.box !== state.activeBox) return false;
      const status = expiryStatus(item.expiry, today);
      if (state.statusFilter !== "all" && status !== state.statusFilter) return false;
      const bucket = actionBucket(item.action);
      if (state.actionFilter !== "all" && bucket !== state.actionFilter) return false;
      if (state.search) {
        const q = state.search.toLowerCase();
        const hay = [item.name, item.nameLocal, item.use, item.ingredient, item.manufacturer, item.notes, item.about].join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function renderKPIs(today) {
    const all = state.items;
    document.getElementById("kpi-total").textContent = all.length;
    document.getElementById("kpi-expired").textContent = all.filter(i => expiryStatus(i.expiry, today) === "expired").length;
    document.getElementById("kpi-soon").textContent = all.filter(i => expiryStatus(i.expiry, today) === "soon").length;
    document.getElementById("kpi-action").textContent = all.filter(needsAction).length;
  }

  function itemCard(item, today) {
    const status = expiryStatus(item.expiry, today);
    const d = daysUntil(item.expiry, today);
    let daysLabel = "";
    if (item.expiry) {
      if (d < 0) daysLabel = `${Math.abs(d)} days ago`;
      else if (d === 0) daysLabel = "today";
      else daysLabel = `in ${d} days`;
    }
    const shortBox = item.box.includes(":") ? item.box.split(":")[1].trim() : item.box;
    return `
    <div class="mt-card" data-id="${item.id}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
        <div style="min-width:0;">
          <div style="font-weight:500; font-size:14px;">${item.name}</div>
          <div style="font-size:12px; color: var(--color-text-secondary); margin-top:2px;">${item.nameLocal && item.nameLocal !== item.name ? item.nameLocal + " &middot; " : ""}${item.ingredient || ""}</div>
        </div>
        <div style="display:flex; gap:4px; flex-shrink:0;">
          ${statusPill(status)}
        </div>
      </div>
      <div style="font-size:13px; color: var(--color-text-primary); margin-top:8px; line-height:1.5;">${item.use}</div>
      ${item.about ? `<div style="font-size:12px; color: var(--color-text-secondary); margin-top:6px; line-height:1.55;">${item.about}</div>` : ""}
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; font-size:12px; color: var(--color-text-secondary); align-items:center;">
        <span><i class="ti ti-box" style="font-size:13px; vertical-align:-2px;" aria-hidden="true"></i> ${shortBox}</span>
        <span>&middot;</span>
        <span>${item.qty || "-"}</span>
        <span>&middot;</span>
        <span>${fmtDate(item.expiry)}${daysLabel ? " (" + daysLabel + ")" : ""}</span>
      </div>
      ${item.notes ? `<div style="font-size:12px; color: var(--color-text-secondary); margin-top:6px; font-style:italic;">${item.notes}</div>` : ""}
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
        <select class="mt-select mt-action-select" data-id="${item.id}" style="height:30px; border-radius: var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); padding:0 6px;">
          <option value="Keep" ${item.action==="Keep"?"selected":""}>Keep</option>
          <option value="Refill Soon" ${item.action==="Refill Soon"?"selected":""}>Refill soon</option>
          <option value="Needs Refill" ${item.action==="Needs Refill"?"selected":""}>Needs refill</option>
          <option value="Keep - No Refill" ${item.action==="Keep - No Refill"?"selected":""}>Keep, no refill</option>
          <option value="Discard" ${item.action==="Discard"?"selected":""}>Discard</option>
        </select>
        <div style="display:flex; gap:6px;">
          <button class="mt-btn mt-refill-btn" data-id="${item.id}" aria-label="Refill ${item.name}" title="Update quantity and expiry"><i class="ti ti-refresh" style="font-size:13px; vertical-align:-2px;" aria-hidden="true"></i> Refill</button>
          <button class="mt-btn mt-edit-btn" data-id="${item.id}" aria-label="Edit ${item.name}"><i class="ti ti-edit" style="font-size:13px;" aria-hidden="true"></i></button>
          <button class="mt-btn mt-del-btn" data-id="${item.id}" aria-label="Delete ${item.name}"><i class="ti ti-trash" style="font-size:13px;" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>`;
  }

  function render() {
    const today = new Date();
    renderTabs();
    renderKPIs(today);
    const items = filteredItems(today);
    const list = document.getElementById("mt-list");
    const empty = document.getElementById("mt-empty");
    if (items.length === 0) {
      list.innerHTML = "";
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      list.innerHTML = items.map(i => itemCard(i, today)).join("");
    }
    list.querySelectorAll(".mt-action-select").forEach(sel => {
      sel.addEventListener("change", async (e) => {
        const id = e.target.dataset.id;
        const item = state.items.find(i => i.id === id);
        if (item) { item.action = e.target.value; await saveState(); render(); }
      });
    });
    list.querySelectorAll(".mt-del-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const id = e.currentTarget.dataset.id;
        state.items = state.items.filter(i => i.id !== id);
        await saveState();
        render();
      });
    });
    list.querySelectorAll(".mt-edit-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = e.currentTarget.dataset.id;
        openEditor(id, false);
      });
    });
    list.querySelectorAll(".mt-refill-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = e.currentTarget.dataset.id;
        openEditor(id, true);
      });
    });
  }

    overlay.innerHTML = `

            <div style="display:flex; gap:8px;">

        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:14px;">
          <button class="mt-btn" id="f-cancel">Cancel</button>
          <button class="mt-btn" id="f-save" style="background:var(--color-text-primary); color:var(--color-background-primary);">Save</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    if (focusRefill) {
      const qtyField = overlay.querySelector("#f-qty");
      setTimeout(() => { qtyField.focus(); qtyField.select(); }, 50);
    }
    overlay.querySelector("#f-cancel").addEventListener("click", () => overlay.remove());
    overlay.querySelector("#f-save").addEventListener("click", async () => {
      draft.box = overlay.querySelector("#f-box").value.trim() || draft.box;
      draft.name = overlay.querySelector("#f-name").value.trim();
      draft.nameLocal = overlay.querySelector("#f-namelocal").value.trim();
      draft.ingredient = overlay.querySelector("#f-ingredient").value.trim();
      draft.use = overlay.querySelector("#f-use").value.trim();
      draft.about = overlay.querySelector("#f-about").value.trim();
      const prevExpiry = draft.expiry;
      draft.qty = overlay.querySelector("#f-qty").value.trim();
      draft.expiry = overlay.querySelector("#f-expiry").value || null;
      draft.notes = overlay.querySelector("#f-notes").value.trim();
      if (!draft.name) { overlay.querySelector("#f-name").style.borderColor = "var(--color-border-secondary)"; return; }
      const expiryChanged = draft.expiry && draft.expiry !== prevExpiry;
      const today = new Date();
      const isFuture = draft.expiry && (new Date(draft.expiry + "T00:00:00") > today);
      if (expiryChanged && isFuture && actionBucket(draft.action) !== "keep") {
        draft.action = "Keep";
      }
      if (isNew) state.items.push(draft);
      else Object.assign(item, draft);
      await saveState();
      overlay.remove();
      render();
    });
  }

  document.getElementById("mt-search").addEventListener("input", (e) => { state.search = e.target.value; render(); });
  document.getElementById("mt-filter-status").addEventListener("change", (e) => { state.statusFilter = e.target.value; render(); });
  document.getElementById("mt-filter-action").addEventListener("change", (e) => { state.actionFilter = e.target.value; render(); });
  document.getElementById("mt-add").addEventListener("click", () => openEditor(null, false));
  document.getElementById("mt-export").addEventListener("click", () => {
    const blob = JSON.stringify(state.items, null, 2);
    const w = window.open("about:blank");
    if (w) { w.document.write("<pre>" + blob.replace(/</g,"&lt;") + "</pre>"); }
  });
  document.getElementById("mt-reset").addEventListener("click", async () => {
    if (!confirm("Reset all data back to the original inventory? This will discard your edits.")) return;
    state.items = JSON.parse(JSON.stringify(SEED_DATA));
    await saveState();
    render();
  });

  (async function init() {
    await loadState();
    render();
  })();
})();


</script>
</body>
</html>
